app = 'bcos-renewal-amine'
primary_region = 'cdg'

[build]
  [build.args]
    VITE_SUPABASE_URL = ""
    VITE_SUPABASE_ANON_KEY = ""
    VITE_GEMINI_API_KEY = ""
    VITE_YOU_COM_API_KEY = ""

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpus = 1
  memory_mb = 1024
